<!DOCTYPE html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Libro Digital PDF</title>

<link rel="stylesheet" href="styles.css">
<script>
(function () {
  const ua = navigator.userAgent;
  const touch = navigator.maxTouchPoints > 0;
  const esDesktop =
    !touch &&
    !/Android|iPhone|iPad|iPod/i.test(ua) &&
    window.innerWidth >= 1100;

  if (esDesktop) {
    window.location.replace("../desktop/index.html");
  }
})();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
<script src="main.js" defer></script>
</head>

      class="creator-float__btn"
      href="https://w3l33.github.io"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Creador"
      aria-describedby="creator-float-tooltip"
    >
      <span class="creator-float__inner">
        <img src="https://raw.githubusercontent.com/W3L33/files/refs/heads/main/IMG_0929.png" alt="" class="creator-float__img" />
      </span>
    </a>
      </div>
</footer>
